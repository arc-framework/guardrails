name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python workspace dependencies
        run: cd packages && env -u VIRTUAL_ENV uv sync --all-extras --dev

      - name: Verify Python formatting
        run: |
          make format
          git diff --exit-code

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python workspace dependencies
        run: cd packages && env -u VIRTUAL_ENV uv sync --all-extras --dev

      - name: Run Ruff checks
        run: make lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python workspace dependencies
        run: cd packages && env -u VIRTUAL_ENV uv sync --all-extras --dev

      - name: Run type checks
        run: make typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python workspace dependencies
        run: cd packages && env -u VIRTUAL_ENV uv sync --all-extras --dev

      - name: Run Python test suites
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [format, ruff, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python workspace dependencies
        run: cd packages && env -u VIRTUAL_ENV uv sync --all-extras --dev

      - name: Build arc-guard-core
        run: cd packages/core && uv build

      - name: Build arc-guard
        run: cd packages/pip && uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: packages/*/dist/
          retention-days: 30
