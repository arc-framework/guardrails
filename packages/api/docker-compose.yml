# Local end-to-end stack: arc-guard-service + Ollama.
#
# Boots the arc-guard-service container with the OpenAI-compatible
# /v1/chat/completions endpoint pointed at a sidecar Ollama instance,
# pre-pulled with llama3.2.
#
# Usage:
#   make docker-up
#   curl http://127.0.0.1:8766/v1/chat/completions \
#     -H 'Content-Type: application/json' \
#     -d '{"model":"llama3.2","messages":[{"role":"user","content":"hello"}]}'
#
# Swagger UI: http://127.0.0.1:8766/docs
# OpenAPI:    http://127.0.0.1:8766/openapi.json

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    ports:
      - "8766:8766"
    environment:
      ARC_GUARD_SERVICE_BIND: 0.0.0.0
      ARC_GUARD_SERVICE_PORT: "8766"
      ARC_GUARD_SERVICE_BACKEND: ollama
      ARC_GUARD_SERVICE_OLLAMA_URL: http://ollama:11434/v1/chat/completions
      ARC_GUARD_SERVICE_LOG_LEVEL: INFO
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

volumes:
  ollama-models:
