[project]
name = "arc-guard-service"
version = "0.1.0"
description = "Thin deployment surface for arc-guardrails — scaffold only in Spec 002; Spec 007 owns full wiring"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "arc-guardrails maintainers" }]
license = { text = "Proprietary" }
dependencies = [
    "arc-guard",
    "pydantic-settings>=2.0",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.110",
    "uvicorn>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_guard_service"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "ASYNC"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
files = ["src", "tests"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
