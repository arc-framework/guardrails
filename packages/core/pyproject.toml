[project]
name = "arc-guard-core"
version = "0.10.0"
description = "Zero-dep contract layer for arc-guardrails (typed models, Protocols, exception hierarchy, pipeline shape)"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "arc-guardrails maintainers" }]
license = { text = "Proprietary" }
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_guard_core"]

[tool.hatch.build.targets.wheel.force-include]
"src/arc_guard_core/py.typed" = "arc_guard_core/py.typed"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "ASYNC"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_any_generics = true
files = ["src", "tests"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
