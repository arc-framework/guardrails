[project]
name = "arc-guard"
version = "0.3.0"
description = "Guardrails library — typed sanitization (presidio + injection regex), built on arc-guard-core"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "arc-guardrails maintainers" }]
license = { text = "Proprietary" }
dependencies = [
    "arc-guard-core",
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
]

# Spec 002 ships zero optional extras. NATS / Unleash / OTEL / semantic /
# webhook adapters were trimmed per roadmap §4 ("nice-to-have features —
# future expansion") and §10 ("do not silently absorb later specs").
# Reintroduction plan:
#   - OTEL middleware  → Spec 004 (Observability and Runtime Hardening)
#   - Semantic / model wrappers → Spec 005 (Safe Rehydration and Intent Fidelity)
#   - NATS / Unleash / webhook transports → Spec 007 (Integration, API,
#     and Documentation; future-transport backlog)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_guard"]

[tool.hatch.build.targets.wheel.force-include]
"src/arc_guard/py.typed" = "arc_guard/py.typed"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "ASYNC"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM", "E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
files = ["src", "tests"]

[[tool.mypy.overrides]]
module = ["presidio_analyzer.*"]
ignore_missing_imports = true

# Spec 001 implementations migrated by Spec 002 do not yet conform to the
# enriched Spec 002 Protocols (Reporter.close, FlagProvider context-only kwarg,
# EntityProvider.entities renamed from get_entities, ActionStrategy.apply
# returning PolicyDecision). Spec 003 wires the real inspector chain and
# refactors these modules to match. Until then, the contract-mismatch error
# codes are silenced on the remaining migrated implementation modules; the
# contract layer in arc-guard-core remains fully --strict.
[[tool.mypy.overrides]]
module = [
    "arc_guard.inspectors.*",
    "arc_guard.strategies.*",
    "arc_guard.reporters.*",
    "arc_guard.flags.*",
    "arc_guard.pipeline",
    "arc_guard.config_env",
]
disable_error_code = [
    "arg-type",
    "attr-defined",
    "call-arg",
    "dict-item",
    "misc",
    "union-attr",
    "assignment",
    "import-untyped",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
