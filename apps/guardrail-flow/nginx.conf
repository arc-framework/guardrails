# GuardRailFlow runtime nginx config.
#
# Two responsibilities:
#   1. Serve the Vite-built SPA from /usr/share/nginx/html with HTML5 history
#      fallback (every unknown path returns index.html so React Router can
#      take over).
#   2. Reverse-proxy /api/* to the arc-guard-service container so the browser
#      sees a single origin and avoids CORS entirely.
#
# The api hostname comes from docker-compose's service-discovery. If you
# deploy the dashboard standalone, override `ARC_API_UPSTREAM` at runtime
# via the `envsubst`-free pattern: set the upstream variable in the compose
# environment block (the api service name resolves inside the network).

server {
    listen      80;
    server_name _;
    server_tokens off;
    client_max_body_size 2m;

    # Static SPA assets
    root        /usr/share/nginx/html;
    index       index.html;

    # Long-cache the immutable build output (hashes in the filename).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # API + SSE proxy. Streaming endpoints (/api/events) need buffering off
    # so server-sent events flush in real time.
    location /api/ {
        proxy_pass         http://api:8766/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback — every non-asset, non-/api/ path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
